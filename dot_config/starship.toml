"$schema" = 'https://starship.rs/config-schema.json'
palette = "flexoki_dark"

# Using ANSI colors
# https://i.stack.imgur.com/KTSQa.png
format = """
[\uE0B6](fg:purple)${env_var.is_elevated_session}[$directory](bg:purple)\
[\uE0B0](bg:bright-black fg:purple)[$git_branch](bg:bright-black)[\uE0B0](fg:bright-black bg:none)\
$git_status$git_state\
$cmd_duration$nodejs$golang$python$docker_context ${env_var.next_meeting} $time $line_break\
$shell $character\
"""

# add_newline = true

[profiles]
short = """
[\uE0B6](fg:purple)[$directory](bg:purple)\
[\uE0B0](bg:12 fg:purple)[ $time](bg:12)\
[\uE0B4](fg:12 bg:none) \
"""

[env_var.next_meeting]
variable = "NextMeeting"
symbol = "­şôå"
format = "[$symbol $env_value]($style)"
style = "fg:red"

[env_var.is_elevated_session]
variable = "ISELEVATEDSESSION"
symbol = "ÔÜí"
format = "[$symbol](bg:purple)"

[directory]
style = "bg:purple fg:white"
format = "[$path]($style)[$read_only]($read_only_style) "
read_only = " ¾░î¥"

[git_branch]
format = "[ $branch $symbol]($style)"
symbol = "´Éİ "
#format = "[ $symbol$branch ]($style)"
style = "bg:bright-black fg:white"

[git_status]
# Show the info relative to the upstream first: how many commits ahead/behind/diverged/conflicted
# Show the info for current working set after: deleted, staged, renamed, modified, untracked.
format = "[$ahead$behind$diverged$conflicted$deleted$staged$renamed$modified$untracked]($style)"
style = "bg:green"
conflicted = "[ Ôëá$count](fg:purple)"
ahead = "[ Ôçí$count](bold fg:purple)"
behind = "[ Ôçú$count](bold fg:purple)"
diverged = "[ Ôçò$count](bold fg:purple)"
untracked = "[ +$count](bold fg:bright-green)"
modified = "[ ~$count](bold fg:cyan)"
staged = "[ ++$count](bold fg:green)"
renamed = "[ ┬╗$count](bold fg:white)"
deleted = "[ Ô£İ$count](bold fg:red)"

[fill]
symbol = ' '

[cmd_duration]
show_milliseconds = true

[time]
disabled = false
format = "$time"
style = "fg:bright-white"

[username]
disabled = true

[ruby]
disabled = true
symbol = "¯Şæ "

[shell]
disabled = false
powershell_indicator = '¯Üâ'
pwsh_indicator = '¯»ç'
bash_indicator = '¯»è'
zsh_indicator = '%_'
cmd_indicator = '¯»ä'
unknown_indicator = '¯Üæ'
style = 'cyan bold'
format = '[$indicator]($style)'

[hostname]
ssh_only = false
ssh_symbol = "¯¼ü "

[battery]
full_symbol = "­şöï"
charging_symbol = "­şöî"
discharging_symbol = "ÔÜí"

